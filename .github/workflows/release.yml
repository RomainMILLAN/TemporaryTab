name: Release

# Déclenché par un tag de version, ex. : git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # nécessaire pour créer la Release et y attacher des fichiers

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Clés API AMO (à définir dans Settings → Secrets → Actions).
      # Sans elles, la signature Firefox est sautée et seul le zip non signé est publié.
      WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
      WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Chrome zip
        run: npm run build:chrome

      - name: Build Firefox zip (fallback non signé)
        run: npm run build:firefox

      - name: Sign Firefox xpi (AMO, canal unlisted)
        if: ${{ env.WEB_EXT_API_KEY != '' && env.WEB_EXT_API_SECRET != '' }}
        run: npm run sign:firefox

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            web-ext-artifacts/*.zip
            web-ext-artifacts/*.xpi
          generate_release_notes: true

  # Publication optionnelle sur le Chrome Web Store.
  # Ne s'exécute que si les 4 secrets CWS_* sont définis (sinon le job est sauté).
  chrome-web-store:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ vars.PUBLISH_CHROME_WEB_STORE == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build Chrome zip
        run: npm run build:chrome
      - name: Upload & publish to Chrome Web Store
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source web-ext-artifacts/temporary-tab-chrome-*.zip \
            --extension-id "$CWS_EXTENSION_ID" \
            --client-id "$CWS_CLIENT_ID" \
            --client-secret "$CWS_CLIENT_SECRET" \
            --refresh-token "$CWS_REFRESH_TOKEN" \
            --auto-publish
